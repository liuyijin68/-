:root{
  --bg:#fef9f3; --card:#fffbf7; --text:#5c3d2e; --text2:#8b6e5c;
  --primary:#d4956b; --primary-dark:#b8704f; --accent:#e8c9a0;
  --border:#e8d5c4; --danger:#e8816e; --success:#7eb89a;
  --shadow:0 2px 12px rgba(140,100,70,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.page{display:none;padding:16px;max-width:480px;margin:0 auto;min-height:100vh}
.page.active{display:block}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;border:none;outline:none;font-size:15px;transition:all .2s;-webkit-tap-highlight-color:transparent;user-select:none;background:var(--card);color:var(--text)}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:var(--primary);color:#fff;font-weight:600}
.btn-primary:active{background:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.input-field{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s}
.input-field:focus{border-color:var(--primary)}
.tab-bar{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:16px;border:1px solid var(--border)}
.tab-item{flex:1;text-align:center;padding:10px 8px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;color:var(--text2)}
.tab-item.active{background:var(--primary);color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:var(--accent);color:var(--text)}
.level-icon{font-size:20px;line-height:1}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;border-radius:20px;font-size:14px;color:#fff;background:rgba(0,0,0,.75);animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.emoji{font-size:48px;text-align:center;margin-bottom:8px}
</style>

// ============ HELPERS ============
const $ = (s) => document.getElementById(s);
const esc = (s) => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const today = () => new Date().toISOString().slice(0,10);
const storageKey = (uid,k) => `dictation_${uid}_${k}`;

function loadBank(uid, key, def) {
  try { const v = localStorage.getItem(storageKey(uid,key)); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function saveBank(uid, key, val) {
  try { localStorage.setItem(storageKey(uid,key), JSON.stringify(val)); } catch(e) {}
}

// ============ TOAST ============
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ============ SPEECH ============
function speakWord(word) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { toast('浏览器不支持语音合成'); resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = S.accent === 'us' ? 'en-US' : 'en-GB';
    u.rate = 0.85; u.pitch = 1;
    u.onend = resolve; u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

// ============ AUDIO REPLAY ============
let audioTimeout = null;
function replayAudio() {
  if (!window.speechSynthesis) { toast('浏览器不支持语音合成'); return; }
  window.speechSynthesis.cancel();
  if (audioTimeout) clearTimeout(audioTimeout);
  // Small delay to ensure cancel is processed
  audioTimeout = setTimeout(() => {
    const u = new SpeechSynthesisUtterance(S.currentWord?.word || '');
    u.lang = S.accent === 'us' ? 'en-US' : 'en-GB';
    u.rate = 0.85; u.pitch = 1;
    u.onend = () => {};
    u.onerror = () => {};
    window.speechSynthesis.speak(u);
  }, 150);
}

// ============ SKIP / EXIT ============
function skipWord() {
  const w = S.currentWord;
  // Add to wrongWords if not already there
  if (w && !S.wrongWords.find(ww => ww.word.toLowerCase() === w.word.toLowerCase())) {
    S.wrongWords.unshift({ word: w.word, meanings: w.meanings });
    saveBank(S.currentUser.id, 'wrong_words', S.wrongWords);
  }
  toast('已跳过：' + (w?.word || ''));
  nextWord();
}

function exitDictation() {
  if (!confirm('确定退出本轮听写？已完成的部分不受影响。')) return;
  S.page = 'home';
  render();
}

  try {
    const res = await fetch(API_BASE + url, { headers:{'Content-Type':'application/json'}, ...opts });
    return await res.json();

// ============ LEVEL COMPUTE ============
function computeLevel(u) {
  if (!u) return {stars:0,moons:0,suns:0,girls:0,princesses:0,display:'⭐0'};
  let mastered = S.masteredCount;
  let princesses = Math.floor(mastered / 10000);
  let rem = mastered % 10000;
  let girls = Math.floor(rem / 1000);
  rem = rem % 1000;
  let suns = Math.floor(rem / 100);
  rem = rem % 100;
  let moons = Math.floor(rem / 10);
  let stars = rem % 10;
  let display = '';
  if (princesses > 0) display += '👸'.repeat(Math.min(princesses,5)) + princesses;
  if (girls > 0) display += '👧'.repeat(Math.min(girls,5)) + girls;
  if (suns > 0) display += '☀️'.repeat(Math.min(suns,5)) + suns;
  if (moons > 0) display += '🌙'.repeat(Math.min(moons,5)) + moons;
  if (stars > 0 || !display) display += '⭐' + stars;
  return {stars,moons,suns,girls,princesses,display};
}

// ============ WORD BANK INIT ============
function initWordBanks(uid) {
  let nw = loadBank(uid, 'new_words', null);
  if (nw === null) {
    // 标准化 INITIAL_WORDS 从 {w,m} 到 {word,meanings} 格式
    nw = INITIAL_WORDS.map(w => ({word: w.w, meanings: w.m}));
    saveBank(uid, 'new_words', nw);
    console.log('[词库] 初始化新词库', nw.length, '词');
  }
  S.newWords = nw;
  S.antiForgetting = loadBank(uid, 'anti_forgetting', []);
  S.wrongWords = loadBank(uid, 'wrong_words', []);
  S.masteredCount = loadBank(uid, 'mastered_count', 0);
}

// ============ DICTATION ============
function startDictation() {
  initWordBanks(S.currentUser.id);
  S.dictSource = 'new';
  S.phase = 'selectSource';
  S.page = 'dictation';
  render();
}

function selectDictSource(src) {
  S.dictSource = src;
  let pool;
  if (src === 'new') {
    pool = [...S.newWords];
  } else if (src === 'wrong') {
    pool = [...S.wrongWords];
  } else {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const cutoff = yesterday.toISOString().slice(0,10);
    pool = S.antiForgetting.filter(w => w.added_date <= cutoff);
  }
  if (pool.length === 0) {
    const msgMap = { new: '新词库为空，请先拍照添加单词', wrong: '错词集为空，继续加油！', anti: '防遗忘词库中无符合条件的单词（需入库次日方可听写）' };
    toast(msgMap[src] || '词库为空');
    S.page = 'home'; render(); return;
  }
  if (pool.length > 10) {
    S.pool = pool;
    S.phase = 'selectCount';
    render();
    return;
  }
  S.pool = pool;
  S.dictCount = pool.length;
  beginDictationRound(pool);
}

function beginDictationRound(pool) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  S.dictQueue = shuffled.slice(0, S.dictCount);
  S.dictIndex = 0;
  S.correctSpell = false;
  S.correctMeaning = false;
  S.currentWord = S.dictQueue[0];
  S.phase = 'playing';
  render();
  setTimeout(() => speakWord(S.currentWord.word), 500);
}

function renderDictation() {
  if (S.phase === 'selectSource') {
    const afCount = S.antiForgetting.length;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const cutoff = yesterday.toISOString().slice(0,10);
    const eligible = S.antiForgetting.filter(w => w.added_date <= cutoff).length;

        </button>
        <button class="btn" onclick="S.page='home';render()" style="width:100%;margin-top:8px">返回</button>
      </div>
    </div>`;
  }

  if (S.phase === 'selectCount') {
    return `<div class="page active" id="page-dictation">
      <div class="card" style="text-align:center">
        <h2 style="margin-bottom:12px">选择听写数量</h2>
        <p style="color:var(--text2);margin-bottom:16px">词库共 ${S.pool.length} 个单词</p>

        <button class="btn btn-primary" onclick="confirmCount()" style="width:100%;padding:14px">开始听写</button>
        <button class="btn" onclick="S.page='home';render()" style="width:100%;margin-top:8px">返回</button>
      </div>
    </div>`;
  }

  const w = S.currentWord;
  const progress = S.dictIndex + 1;
  const total = S.dictQueue.length;
  const progPct = ((progress-1)/total*100);
  const isLast = progress >= total;

  return `<div class="page active" id="page-dictation">

      </div>

        <button class="btn btn-primary" onclick="checkSpell()" style="width:100%;margin-top:8px">确认拼写</button>

        <input class="input-field" id="meaning-input" placeholder="输入中文含义..." style="text-align:center;font-size:16px">
        <button class="btn btn-primary" onclick="checkMeaning()" style="width:100%;margin-top:8px">确认含义</button>
        <button class="btn" onclick="openHandwrite('meaning')" style="width:100%;margin-top:4px;font-size:13px">✍️ 手写输入中文</button>
      </div>` : ''}

      ${S.correctSpell && S.correctMeaning ? `
      <div style="color:var(--success);font-weight:600;font-size:18px;margin-bottom:12px">

      <button class="btn btn-primary" onclick="nextWord()" style="width:100%;padding:14px;font-size:16px">

  </div>`;

async function checkSpell() {
  const input = document.getElementById('spell-input')?.value?.trim().toLowerCase();
  if (!input) return toast('请输入拼写');
  const correct = input === S.currentWord.word.toLowerCase();
  if (correct) {
    S.correctSpell = true;
    render();
    setTimeout(() => document.getElementById('meaning-input')?.focus(), 100);
  } else {
    moveToWrongWords();
    toast('拼写错误，已加入错词集。正确答案：' + S.currentWord.word);
    nextWord();
  }
}

async function checkMeaning() {
  const input = document.getElementById('meaning-input')?.value?.trim();
  if (!input) return toast('请输入中文含义');
  const correctMeanings = (S.currentWord.meanings || [''])[0].split(/[,;，；]/);
  const matched = correctMeanings.some(m => m.trim().includes(input) || input.includes(m.trim()));
  if (matched) {
    S.correctMeaning = true;
    handleWordCorrect();
    render();
  } else {
    moveToWrongWords();
    toast(`不正确，正确答案：${(S.currentWord.meanings||[''])[0]}。已加入错词集`);
    nextWord();
  }
}

function moveToWrongWords() {
  const w = S.currentWord;
  const uid = S.currentUser.id;
  // antiForgetting: remove from anti, it stays
  if (S.dictSource === 'anti') {
    const idx = S.antiForgetting.findIndex(af => af.word.toLowerCase() === w.word.toLowerCase());
    if (idx >= 0) S.antiForgetting.splice(idx, 1);
    saveBank(uid, 'anti_forgetting', S.antiForgetting);
  }
  // Add to wrongWords (avoid duplicate)
  if (!S.wrongWords.find(ww => ww.word.toLowerCase() === w.word.toLowerCase())) {
    S.wrongWords.unshift({ word: w.word, meanings: w.meanings });
    saveBank(uid, 'wrong_words', S.wrongWords);
  }
}

async function handleWordCorrect() {
  const w = S.currentWord;
  const uid = S.currentUser.id;

  if (S.dictSource === 'new') {
    // New word correct → antiForgetting (次日可复习, 不积分), 保留在新词库
    if (!S.antiForgetting.find(af => af.word.toLowerCase() === w.word.toLowerCase())) {
      S.antiForgetting.push({ word: w.word, meanings: w.meanings, added_date: today() });
      saveBank(uid, 'anti_forgetting', S.antiForgetting);
    }
    toast('✅ 正确！已转入防遗忘词库（次日可复习），仍保留在新词库');
  } else if (S.dictSource === 'wrong') {
    // Wrong word correct → antiForgetting (次日可复习, 不积分)
    const idx = S.wrongWords.findIndex(ww => ww.word.toLowerCase() === w.word.toLowerCase());
    if (idx >= 0) S.wrongWords.splice(idx, 1);
    saveBank(uid, 'wrong_words', S.wrongWords);
    if (!S.antiForgetting.find(af => af.word.toLowerCase() === w.word.toLowerCase())) {
      S.antiForgetting.push({ word: w.word, meanings: w.meanings, added_date: today() });
      saveBank(uid, 'anti_forgetting', S.antiForgetting);
    }
    toast('✅ 正确！已从错词集转入防遗忘词库（次日可复习）');
  } else {
    // Anti-forgetting correct → mastered (积分+升级)
    const idx = S.antiForgetting.findIndex(af => af.word.toLowerCase() === w.word.toLowerCase());
    if (idx >= 0) S.antiForgetting.splice(idx, 1);
    saveBank(uid, 'anti_forgetting', S.antiForgetting);
    S.masteredCount++;
    saveBank(uid, 'mastered_count', S.masteredCount);

    const result = await earnPoints(w.word);
    if (result?.data) {
      const d = result.data;
      S.currentUser = { ...S.currentUser, points: d.points, masteredWords: d.masteredWords, name: d.username || d.name || S.currentUser.name, username: d.username || d.name || S.currentUser.username };
      localStorage.setItem('current_user', JSON.stringify(S.currentUser));
      if (d.upgradeBonus) {
        setTimeout(() => alert(`🎉 升级奖励！获得 ${d.upgradeBonus} 积分！\n${d.upgradeReason||''}`), 300);
      }
    }
    toast(`🎉 掌握！+1积分 (累计掌握${S.masteredCount}词)`);
  }
}

function confirmCount() {
  const val = parseInt(document.getElementById('count-input')?.value || '10');
  S.dictCount = Math.max(1, Math.min(val, S.pool.length));
  beginDictationRound(S.pool);
}

async function nextWord() {
  S.dictIndex++;
  if (S.dictIndex >= S.dictQueue.length) {
    toast('🎉 本轮听写完成！');
    S.page = 'home';
    render();
    return;
  }
  S.correctSpell = false;
  S.correctMeaning = false;
  S.currentWord = S.dictQueue[S.dictIndex];
  S.phase = 'playing';
  render();
  setTimeout(() => speakWord(S.currentWord.word), 300);
}

async function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const st = document.getElementById('upload-status');
  st.innerHTML = '⏳ 上传中...';

  // Upload image
  const formData = new FormData();
  formData.append('file', file);
  let imageUrl;
  try {
    const res = await fetch(API_BASE + '/api/dictation/upload-image', { method:'POST', body: formData });
    const d = await res.json();
    imageUrl = d.data?.url || d.url;
    if (!imageUrl) throw new Error('No url');
  } catch(e) { st.innerHTML = '❌ 上传失败'; return; }

  // Recognize words
  st.innerHTML = '🤖 AI识别中...';
  try {
    const res = await fetch(API_BASE + '/api/dictation/recognize-all-words', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageUrl })
    });
    const d = await res.json();
    const words = d.data?.words || d.words || [];
    if (!words.length) { st.innerHTML = '⚠️ 未识别到单词'; return; }

    const uid = S.currentUser.id;
    initWordBanks(uid);
    let added = 0;
    for (const w of words) {
      const word = (w.word||w.english||'').trim();
      const meaning = (w.meaning||w.chinese||'').trim();
      if (!word || !meaning) continue;
      const exists = S.newWords.find(nw => nw.word.toLowerCase() === word.toLowerCase());
      if (exists) continue;
      S.newWords.unshift({ word, meanings: [meaning] });
      added++;
    }
    saveBank(uid, 'new_words', S.newWords);
    st.innerHTML = `✅ 新增 ${added} 个单词，词库共 ${S.newWords.length} 词`;
    toast(`新增 ${added} 个单词`);
  } catch(e) { st.innerHTML = '❌ 识别失败'; }
}

function addManualWord() {
  const word = document.getElementById('manual-word')?.value?.trim();
  const meaning = document.getElementById('manual-meaning')?.value?.trim();
  if (!word || !meaning) return toast('请填写英文单词和中文含义');
  const uid = S.currentUser.id;
  initWordBanks(uid);
  const exists = S.newWords.find(nw => nw.word.toLowerCase() === word.toLowerCase());
  if (exists) return toast('该单词已存在');
  S.newWords.unshift({ word, meanings: [meaning] });
  saveBank(uid, 'new_words', S.newWords);
  document.getElementById('manual-word').value = '';
  document.getElementById('manual-meaning').value = '';
  toast(`✅ 已添加：${word} — ${meaning}（新词库共 ${S.newWords.length} 词）`);
}

// ============ HANDWRITE ============
function openHandwrite(target) {
  // target: 'spell' or 'meaning'
  const inputId = target === 'spell' ? 'spell-input' : 'meaning-input';
  const canvas = document.createElement('canvas');
  canvas.width = 300; canvas.height = 200;
  canvas.style.cssText = 'border:2px solid var(--border);border-radius:12px;background:#fff;width:100%;touch-action:none';
  let drawing = false, ctx = canvas.getContext('2d');
  ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#333';

  const inputEl = document.getElementById(inputId);
  if (!inputEl) return;
  const container = inputEl.parentElement;

  // Replace input with canvas
  if (inputEl) inputEl.style.display = 'none';

  const btn = document.createElement('div');
  btn.innerHTML = '<button class="btn btn-primary" id="hw-done" style="width:100%;margin-top:8px">识别手写</button>';
  container.appendChild(canvas);
  container.appendChild(btn);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const t=e.touches[0]; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX-r.left,t.clientY-r.top); });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing)return; const t=e.touches[0]; const r=canvas.getBoundingClientRect(); ctx.lineTo(t.clientX-r.left,t.clientY-r.top); ctx.stroke(); });
  canvas.addEventListener('touchend', () => { drawing=false; });
  canvas.addEventListener('mousedown', e => { drawing=true; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.clientX-r.left,e.clientY-r.top); });
  canvas.addEventListener('mousemove', e => { if(!drawing)return; const r=canvas.getBoundingClientRect(); ctx.lineTo(e.clientX-r.left,e.clientY-r.top); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => { drawing=false; });

  document.getElementById('hw-done').onclick = async () => {
    const dataUrl = canvas.toDataURL('image/png');
    try {
      const blob = await (await fetch(dataUrl)).blob();
      const fd = new FormData(); fd.append('file', blob, 'hw.png');
      const upRes = await fetch(API_BASE + '/api/dictation/upload-image', { method:'POST', body:fd });
      const upData = await upRes.json();
      const imgUrl = upData.data?.url || upData.url;
      if (!imgUrl) throw new Error('upload failed');

      const recRes = await fetch(API_BASE + '/api/dictation/recognize-handwriting', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({imageUrl:imgUrl})
      });
      const recData = await recRes.json();
      const text = recData.data?.text || recData.text || '';
      if (inputEl) { inputEl.style.display = ''; inputEl.value = text; }
      canvas.remove(); btn.remove();
      toast(text ? '识别结果：' + text : '未识别到文字');
    } catch(e) {
      if (inputEl) inputEl.style.display = '';
      canvas.remove(); btn.remove();
      toast('手写识别失败');
    }
  };
}

// ============ AUTH ============
async function registerUser() {
  const name = document.getElementById('new-user-name')?.value?.trim();
  if (!name) return toast('请输入用户名');
  const res = await api('/api/growth/register', { method:'POST', body:JSON.stringify({username:name}) });
  if (res?.data) {
    const uid = res.data.id;
    initWordBanks(uid);
    loginUser({ id: uid, username: name, points: 0, masteredWords: 0 });
  }
}

async function loginUser(u) {
  S.currentUser = u;
  localStorage.setItem('current_user', JSON.stringify(u));
  // Refresh from backend
  const res = await api(`/api/growth/user/${u.id}`);
  if (res?.data) {
    // Backend returns {username, points, ...} — normalize to also have .name
    const d = res.data;
    S.currentUser = { ...d, name: d.username || d.name, username: d.username || d.name };
    localStorage.setItem('current_user', JSON.stringify(S.currentUser));
  }
  initWordBanks(u.id);
  S.page = 'home';
  render();
}

async function deleteUser(uid) {
  if (!confirm('确定删除该用户？所有词库数据将被清除。')) return;
  const res = await api(`/api/growth/user/${uid}`, { method:'DELETE' });
  if (res?.code === 200) {
    // Clear localStorage data
    ['new_words','anti_forgetting','wrong_words','mastered_count'].forEach(k => {
      try { localStorage.removeItem(storageKey(uid, k)); } catch {}
    });
    try { localStorage.removeItem('current_user'); } catch {}
    toast('用户已删除');
    // Reload
    S.currentUser = null; S.page = 'login'; init();
  } else {
    toast(res?.msg || '删除失败');
  }
}

function switchUser() {
  localStorage.removeItem('current_user');
  S.currentUser = null;
  S.page = 'login';
  render();
}

// ============ INIT ============
async function init() {
  // Load user list
  const res = await api('/api/growth/users');
  const users = res?.data || [];
  const cachedUser = (() => { try { return JSON.parse(localStorage.getItem('current_user')); } catch { return null; } })();

  // If cached user exists, refresh and go home
  if (cachedUser?.id) {
    const refresh = await api(`/api/growth/user/${cachedUser.id}`);
    if (refresh?.data) {
      const d = refresh.data;
      S.currentUser = { ...d, name: d.username || d.name, username: d.username || d.name };
      initWordBanks(cachedUser.id);
      S.page = 'home';
      render();
      return;
    }
  }

  // Show login
  S.page = 'login';
  render();

  // Populate user list
  const listEl = document.getElementById('user-list');
  if (listEl && users.length > 0) {
    listEl.innerHTML = users.map(u => `
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:12px;margin-bottom:6px;cursor:pointer" onclick="loginUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">
        <span style="flex:1;font-weight:600">${esc(u.username || u.name || '?')}</span>
        <span style="font-size:12px;color:var(--text2)">⭐${u.points||0}</span>
        <span style="font-size:12px;color:var(--text2)">✅${u.masteredWords||0}</span>
        <span onclick="event.stopPropagation();deleteUser(${u.id})" style="cursor:pointer;padding:4px 8px;color:var(--danger);font-size:14px" title="删除用户">🗑</span>
      </div>`).join('');
  }
}

function afterRender() {
  // Focus spell input on dictation page
  if (S.page === 'dictation' && S.phase === 'playing' && !S.correctSpell) {
    setTimeout(() => document.getElementById('spell-input')?.focus(), 200);
  }
}

init();
</script>
