// ==================== STATE ====================
function getWordBankKey() {
  return 'ww_dict_' + (S.currentUser?.id || 'anon');
}

function loadWordBank() {
  try {
    const raw = localStorage.getItem(getWordBankKey());
    if (raw) {
      const d = JSON.parse(raw);
      S.newWords = d.newWords || [];
      S.reviewWords = d.reviewWords || [];
    } else {
      // First time: load initial words
      S.newWords = JSON.parse(JSON.stringify(INITIAL_WORDS));
      S.reviewWords = [];
      saveWordBank();
    }
  } catch (e) {
    S.newWords = JSON.parse(JSON.stringify(INITIAL_WORDS));
    S.reviewWords = [];
  }
}

function saveWordBank() {
  try {
    localStorage.setItem(getWordBankKey(), JSON.stringify({
      newWords: S.newWords,
      reviewWords: S.reviewWords,
    }));
  } catch (e) {
    console.error('saveWordBank error:', e);
  }
}

// ==================== API ====================
async function api(url, options = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
  });
  return res.json();
}

async function apiUpload(url, formData) {
  const res = await fetch(url, { method: 'POST', body: formData });
  return res.json();
}

// ==================== TOAST ====================
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ==================== LEVEL ====================
function calcLevel(mastered) {
  const stars = mastered % 10;
  const moons = Math.floor(mastered / 10) % 10;
  const suns = Math.floor(mastered / 100) % 10;
  const girls = Math.floor(mastered / 1000) % 10;
  const princesses = Math.floor(mastered / 10000);
  let icon = '';
  if (princesses > 0) icon += '👸'.repeat(princesses);
  if (girls > 0) icon += '👧'.repeat(girls);
  if (suns > 0) icon += '☀️'.repeat(suns);
  if (moons > 0) icon += '🌙'.repeat(moons);
  icon += '⭐'.repeat(stars);
  return icon || '0⭐';
}

function calcUpgradeBonus(oldCount, newCount) {
  let bonus = 0;
  const oldLevel = Math.floor(oldCount / 10);
  const newLevel = Math.floor(newCount / 10);
  for (let lv = oldLevel + 1; lv <= newLevel; lv++) {
    if (lv % 1000 === 0) bonus += 2000; // princess
    else if (lv % 100 === 0) bonus += 200; // girl
    else if (lv % 10 === 0) bonus += 20; // sun
    else bonus += 2; // moon
  }
  return bonus;
}

// ==================== TTS (Web Speech API) ====================
function speakWord(word) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US';
    u.rate = 0.8;
    u.pitch = 1;
    u.onend = () => resolve();
    u.onerror = () => resolve();
    window.speechSynthesis.speak(u);
  });
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  switch (S.page) {
    case 'login': app.innerHTML = renderLogin(); break;
    case 'home': app.innerHTML = renderHome(); break;
    case 'dictation': app.innerHTML = renderDictation(); break;
    case 'upload': app.innerHTML = renderUpload(); break;
    case 'profile': app.innerHTML = renderProfile(); break;
    case 'history': app.innerHTML = renderHistory(); break;
  }
  bindEvents();
}

function showRegister() {
  document.getElementById('registerForm').style.display = 'block';
}

async function selectUser(id) {
  try {
    const res = await api('/api/growth/user/' + id);
    if (res.code === 200) {
      S.currentUser = res.data;
      localStorage.setItem('currentUserId', id);
      loadWordBank();
      S.page = 'home';
      render();
    }
  } catch (e) {
    toast('加载用户失败');
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  if (!name) { toast('请输入用户名'); return; }
  try {
    const res = await api('/api/growth/register', {
      method: 'POST',
      body: JSON.stringify({ username: name }),
    });
    if (res.code === 200) {
      toast('注册成功！');
      S.currentUser = res.data;
      localStorage.setItem('currentUserId', res.data.id);
      loadWordBank();
      S.page = 'home';
      render();
    } else {
      toast(res.msg || '注册失败');
    }
  } catch (e) {
    toast('网络错误');
  }
}

      </div>
      ${totalWords > 0 ? `
      <button class="btn w-full mt-3 py-2 rounded-lg text-sm border" style="border-color:#e2d5c8;color:#999;" onclick="resetWordBank()">重置词库</button>
      ` : `
      <button class="btn w-full mt-3 py-2 rounded-lg text-sm text-white font-semibold" style="background:#8b5e3c;" onclick="reloadInitialWords()">导入初始词库 (${INITIAL_WORDS.length}词)</button>
      `}
    </div>

    <!-- Switch User -->
    <button class="btn w-full mt-4 py-2 rounded-xl text-sm text-gray-400" onclick="switchUser()">切换用户</button>
  </div>`;
}

function switchUser() {
  S.currentUser = null;
  localStorage.removeItem('currentUserId');
  S.newWords = [];
  S.reviewWords = [];
  S.page = 'login';
  render();
}

function resetWordBank() {
  if (confirm('确定要清空并重置词库吗？')) {
    S.newWords = JSON.parse(JSON.stringify(INITIAL_WORDS));
    S.reviewWords = [];
    saveWordBank();
    render();
    toast('词库已重置');
  }
}

function reloadInitialWords() {
  S.newWords = JSON.parse(JSON.stringify(INITIAL_WORDS));
  S.reviewWords = [];
  saveWordBank();
  render();
  toast('已导入 ' + INITIAL_WORDS.length + ' 个单词');
}

// ==================== DICTATION ====================
function startDictation() {
  const allWords = [...S.newWords, ...S.reviewWords];
  if (allWords.length === 0) { toast('词库为空，请先拍照识词或导入初始词库'); return; }

  if (allWords.length > 10) {
    // Show count selector
    S.page = 'dictCountSelect';
    render();
    return;
  }

  S.dictCount = allWords.length;
  beginDictation(allWords.slice(0, S.dictCount));
}

function beginDictation(queue) {
  S.dictQueue = queue;
  S.dictIndex = 0;
  S.page = 'dictation';
  render();
  setTimeout(() => playCurrentWord(), 500);
}

async function playCurrentWord() {
  if (S.dictIndex >= S.dictQueue.length) {
    S.page = 'home';
    render();
    toast('听写完成！');
    return;
  }
  S.currentWord = S.dictQueue[S.dictIndex];
  S.phase = 'playing';
  S.correctSpell = false;
  S.correctMeaning = false;
  renderDictContent();
  await speakWord(S.currentWord.word);
}

function renderDictCountSelect() {
  const total = S.newWords.length + S.reviewWords.length;
  return `<div class="page active" style="padding:24px 16px;max-width:480px;margin:0 auto;">
    <div class="card text-center">
      <div class="text-4xl mb-3">🔢</div>
      <h2 class="text-lg font-bold mb-1" style="color:#6b4c2e;">选择听写数量</h2>
      <p class="text-gray-500 text-sm mb-4">词库共 ${total} 个单词</p>
      <input id="dictCountInput" type="number" class="input-field text-center text-2xl font-bold mb-4" value="10" min="1" max="${total}" style="width:120px;margin:0 auto;display:block;">
      <div class="flex gap-3 justify-center mb-4">
        ${[5,10,15,20].map(n => n <= total ? `<button class="btn px-4 py-2 rounded-lg border text-sm" style="border-color:#e2d5c8;" onclick="document.getElementById('dictCountInput').value=${n}">${n}个</button>` : '').join('')}
      </div>
      <button class="btn w-full py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="confirmDictCount()">开始听写</button>
    </div>
  </div>`;
}

function confirmDictCount() {
  const count = parseInt(document.getElementById('dictCountInput').value) || 10;
  S.dictCount = Math.min(count, S.newWords.length + S.reviewWords.length);
  const allWords = [...S.newWords, ...S.reviewWords];
  beginDictation(allWords.slice(0, S.dictCount));
}

function renderDictation() {
  return `<div class="page active" style="padding:24px 16px;max-width:480px;margin:0 auto;">
    <div class="flex items-center justify-between mb-4">
      <button class="btn text-sm" style="color:#8b5e3c;" onclick="S.page='home';render();">← 返回</button>
      <span class="text-sm text-gray-500">${S.dictIndex + 1} / ${S.dictQueue.length}</span>
      <div style="width:40px;"></div>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
      <div class="h-2 rounded-full" style="width:${((S.dictIndex)/S.dictQueue.length*100)}%;background:#8b5e3c;"></div>
    </div>
    <div id="dictContent"></div>
  </div>`;
}

function renderDictContent() {
  const el = document.getElementById('dictContent');
  if (!el) return;
  const w = S.currentWord;
  if (!w) { el.innerHTML = '<div class="text-center text-gray-500">加载中...</div>'; return; }

  if (S.phase === 'playing') {
    el.innerHTML = `<div class="card text-center py-8">
      <div class="text-5xl mb-4">🔊</div>
      <div class="text-gray-500 mb-4">仔细听，然后拼写单词</div>
      <button class="btn px-6 py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="replayWord()">🔊 再听一次</button>
      <div class="mt-4">
        <input id="spellInput" class="input-field text-center text-xl" placeholder="输入单词拼写" autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')checkSpell()">
      </div>
      <button class="btn w-full mt-3 py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="checkSpell()">确认拼写</button>
      <button class="btn w-full mt-2 py-2 rounded-xl text-sm" style="color:#999;" onclick="skipWord()">跳过 (显示答案)</button>
    </div>`;
  } else if (S.phase === 'spelling') {
    el.innerHTML = `<div class="card text-center py-8">
      <div class="text-5xl mb-4">${S.correctSpell ? '✅' : '❌'}</div>
      <div class="text-xl font-bold mb-1" style="color:${S.correctSpell?'#4caf50':'#e53935'};">${esc(w.word)}</div>
      <div class="text-gray-500 mb-2">${esc(w.meanings?.[0] || '')}</div>
      ${!S.correctSpell ? `<div class="text-sm text-gray-400 mb-3">你的拼写不正确，已显示正确答案</div>` : ''}
      <div class="text-gray-500 mb-3">请输入中文含义</div>
      <input id="meaningInput" class="input-field text-center text-xl" placeholder="输入中文含义" autocomplete="off" onkeydown="if(event.key==='Enter')checkMeaning()">
      <button class="btn w-full mt-3 py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="checkMeaning()">确认含义</button>
      <button class="btn w-full mt-2 py-2 rounded-xl text-sm" style="color:#999;" onclick="skipMeaning()">跳过</button>
    </div>`;
  } else if (S.phase === 'meaning') {
    el.innerHTML = `<div class="card text-center py-8">
      <div class="text-5xl mb-4">${S.correctMeaning ? '🎉' : '📝'}</div>
      <div class="text-lg font-bold mb-1">${esc(w.word)}</div>
      <div class="text-gray-500 mb-2">${esc(w.meanings?.[0] || '')}</div>
      <div class="text-sm ${S.correctMeaning ? 'text-green-600' : 'text-red-500'} mb-3">
        ${S.correctMeaning ? '含义正确！' : '含义不正确，已显示正确答案'}
      </div>
      ${(S.correctSpell && S.correctMeaning) ? `<div class="text-green-600 font-semibold mb-3">🎉 完全掌握！+1积分</div>` : ''}
      <button class="btn w-full py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="nextWord()">
        ${S.dictIndex < S.dictQueue.length - 1 ? '下一个单词 →' : '完成听写'}
      </button>
    </div>`;
  }
}

function replayWord() {
  if (S.currentWord) speakWord(S.currentWord.word);
}

async function checkSpell() {
  const input = (document.getElementById('spellInput')?.value || '').trim().toLowerCase();
  const correct = S.currentWord.word.toLowerCase();
  S.correctSpell = (input === correct);
  S.phase = 'spelling';
  renderDictContent();
}

async function checkMeaning() {
  const input = (document.getElementById('meaningInput')?.value || '').trim();
  const meanings = S.currentWord.meanings || [];
  S.correctMeaning = meanings.some(m => input.includes(m) || m.includes(input));
  S.phase = 'meaning';

  // Remove from word bank if both correct
  if (S.correctSpell && S.correctMeaning) {
    removeWordFromBank(S.currentWord.word);
  }

  // Earn points
  if (S.currentUser) {
    try {
      const res = await api('/api/growth/earn', {
        method: 'POST',
        body: JSON.stringify({ userId: S.currentUser.id, word: S.currentWord.word }),
      });
      if (res.code === 200) {
        const earnData = res.data;
        // Refresh user info
        const r2 = await api('/api/growth/user/' + S.currentUser.id);
        if (r2.code === 200) S.currentUser = r2.data;
        // Check upgrade bonus
        if (earnData.upgradeBonus && earnData.upgradeBonus > 0) {
          setTimeout(() => toast('🎉 升级奖励 +' + earnData.upgradeBonus + ' 积分！(' + earnData.upgradeReason + ')'), 500);
        }
      }
    } catch (e) { console.error('earn error:', e); }
  }

  renderDictContent();
}

function removeWordFromBank(word) {
  const wl = word.toLowerCase();
  S.newWords = S.newWords.filter(w => w.word.toLowerCase() !== wl);
  S.reviewWords = S.reviewWords.filter(w => w.word.toLowerCase() !== wl);
  saveWordBank();
}

function skipWord() {
  S.correctSpell = false;
  S.phase = 'spelling';
  renderDictContent();
}

function skipMeaning() {
  S.correctMeaning = false;
  S.phase = 'meaning';
  renderDictContent();
}

function nextWord() {
  S.dictIndex++;
  if (S.dictIndex >= S.dictQueue.length) {
    S.page = 'home';
    render();
    toast('听写完成！');
    return;
  }
  setTimeout(() => playCurrentWord(), 300);
}

// ==================== UPLOAD ====================
function renderUpload() {
  return `<div class="page active" style="padding:24px 16px;max-width:480px;margin:0 auto;">
    <div class="flex items-center mb-4">
      <button class="btn text-sm" style="color:#8b5e3c;" onclick="S.page='home';render();">← 返回</button>
      <span class="ml-3 font-semibold" style="color:#6b4c2e;">拍照识别单词</span>
    </div>
    <div class="card text-center py-8 mb-4">
      <div class="text-5xl mb-3">📷</div>
      <div class="text-gray-500 mb-4">拍摄或选择单词表照片，AI 自动识别单词</div>
      <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageSelect(event)">
      <button class="btn w-full py-3 rounded-xl text-white font-semibold mb-2" style="background:#8b5e3c;" onclick="document.getElementById('imageInput').click()">📷 拍照 / 选图片</button>
    </div>
    <div id="uploadResult"></div>
    <div class="card">
      <div class="font-semibold mb-2" style="color:#6b4c2e;">当前词库</div>
      <div class="text-sm text-gray-500">新单词 ${S.newWords.length} · 复习 ${S.reviewWords.length}</div>
    </div>
  </div>`;
}

async function handleImageSelect(e) {
  const file = e.target.files?.[0];
  if (!file) return;

  const resultEl = document.getElementById('uploadResult');
  resultEl.innerHTML = '<div class="card text-center py-4"><div class="text-gray-500">识别中...</div></div>';

  try {
    // Upload image
    const formData = new FormData();
    formData.append('image', file);
    const uploadRes = await apiUpload('/api/dictation/upload-image', formData);
    if (uploadRes.code !== 200) { resultEl.innerHTML = '<div class="card text-center py-4 text-red-500">上传失败</div>'; return; }

    // Recognize words
    const recRes = await api('/api/dictation/recognize-all-words', {
      method: 'POST',
      body: JSON.stringify({ imageUrl: uploadRes.data.imageUrl }),
    });
    if (recRes.code !== 200 || !recRes.data?.words?.length) {
      resultEl.innerHTML = '<div class="card text-center py-4 text-red-500">未识别到单词</div>';
      return;
    }

    // Add to front of newWords (append mode)
    const recognized = recRes.data.words.map(w => ({
      word: cleanWord(w.word || ''),
      meanings: w.meanings || [w.meaning || ''],
    })).filter(w => w.word && w.word.length >= 1);

    // Deduplicate and add to front
    const existingWords = new Set(S.newWords.map(w => w.word.toLowerCase()));
    const toAdd = recognized.filter(w => !existingWords.has(w.word.toLowerCase()));
    S.newWords = [...toAdd, ...S.newWords];
    saveWordBank();

    resultEl.innerHTML = `<div class="card text-center py-4">
      <div class="text-green-600 font-semibold text-lg mb-2">✅ 识别成功！</div>
      <div class="text-gray-500 mb-2">新增 ${toAdd.length} 个单词</div>
      <div class="flex flex-wrap gap-1 justify-center">
        ${toAdd.slice(0,20).map(w => `<span class="px-2 py-1 rounded text-xs" style="background:#fdf6f0;">${esc(w.word)}</span>`).join('')}
        ${toAdd.length > 20 ? `<span class="text-xs text-gray-400">等${toAdd.length}个</span>` : ''}
      </div>
      <button class="btn mt-3 px-6 py-2 rounded-lg text-sm text-white" style="background:#8b5e3c;" onclick="S.page='home';render();">返回首页</button>
    </div>`;
  } catch (e) {
    resultEl.innerHTML = '<div class="card text-center py-4 text-red-500">识别出错，请重试</div>';
  }
}

function cleanWord(w) {
  return w.replace(/[\[\]【】\(\)（）\"\',.。，；;:：\!！\?？\d]/g, '').trim();
}

// ==================== PROFILE ====================
function renderProfile() {
  const u = S.currentUser;
  if (!u) { S.page = 'login'; return render(); }
  const levelIcon = calcLevel(u.mastered_words || 0);

  return `<div class="page active" style="padding:24px 16px;max-width:480px;margin:0 auto;">
    <div class="flex items-center mb-4">
      <button class="btn text-sm" style="color:#8b5e3c;" onclick="S.page='home';render();">← 返回</button>
      <span class="ml-3 font-semibold" style="color:#6b4c2e;">养成详情</span>
    </div>
    <div class="card text-center mb-4" style="background:linear-gradient(135deg,#fdf6f0,#faf0e6);">
      <div class="text-lg font-bold mb-2" style="color:#6b4c2e;">${esc(u.username)}</div>
      <div class="text-5xl mb-2">${levelIcon || '0⭐'}</div>
      <div class="text-sm text-gray-500">掌握 ${u.masteredWords || 0} 个单词</div>
      <div class="text-3xl font-bold mt-3" style="color:#8b5e3c;">${u.points || 0}</div>
      <div class="text-xs text-gray-500">可用积分</div>
    </div>
    <div class="card mb-4">
      <div class="font-semibold mb-3" style="color:#6b4c2e;">积分消耗</div>
      <div class="flex gap-2 mb-3">
        <input id="spendAmount" type="number" class="input-field flex-1" placeholder="消耗积分数" min="1">
      </div>
      <input id="spendNote" class="input-field mb-3" placeholder="备注（如：兑换贴纸）">
      <button class="btn w-full py-3 rounded-xl text-white font-semibold" style="background:#8b5e3c;" onclick="doSpend()">确认消耗</button>
    </div>
    <div class="card">
      <div class="font-semibold mb-2" style="color:#6b4c2e;">等级规则</div>
      <div class="text-sm text-gray-500 space-y-1">
        <div>⭐ = 1个单词</div>
        <div>🌙 = 10⭐（升级奖励+2积分）</div>
        <div>☀️ = 10🌙（升级奖励+20积分）</div>
        <div>👧 = 10☀️（升级奖励+200积分）</div>
        <div>👸 = 10👧（升级奖励+2000积分）</div>
      </div>
    </div>
  </div>`;
}

async function doSpend() {
  const amount = parseInt(document.getElementById('spendAmount')?.value) || 0;
  const note = (document.getElementById('spendNote')?.value || '').trim();
  if (amount <= 0) { toast('请输入消耗积分'); return; }
  if (amount > (S.currentUser?.points || 0)) { toast('积分不足'); return; }
  try {
    const res = await api('/api/growth/spend', {
      method: 'POST',
      body: JSON.stringify({ userId: S.currentUser.id, amount, reason: note }),
    });
    if (res.code === 200) {
      S.currentUser.points = res.data.points;
      toast('已消耗 ' + amount + ' 积分');
      render();
    } else {
      toast(res.msg || '操作失败');
    }
  } catch (e) {
    toast('网络错误');
  }
}

// ==================== HISTORY ====================
function renderHistory() {
  return `<div class="page active" style="padding:24px 16px;max-width:480px;margin:0 auto;">
    <div class="flex items-center mb-4">
      <button class="btn text-sm" style="color:#8b5e3c;" onclick="S.page='home';render();">← 返回</button>
      <span class="ml-3 font-semibold" style="color:#6b4c2e;">积分明细</span>
    </div>
    <div id="historyContent"><div class="text-center text-gray-500 py-8">加载中...</div></div>
  </div>`;
}

// ==================== EVENTS ====================
function bindEvents() {
  if (S.page === 'history') loadHistory();
  if (S.page === 'dictCountSelect') {
    const app = document.getElementById('app');
    app.innerHTML = renderDictCountSelect();
  }
}

async function loadHistory() {
  if (!S.currentUser) return;
  try {
    const res = await api('/api/growth/history/' + S.currentUser.id);
    const el = document.getElementById('historyContent');
    if (!el) return;
    if (res.code === 200 && res.data?.length > 0) {
      el.innerHTML = res.data.map(h => `
        <div class="card mb-2 flex justify-between items-center">
          <div>
            <div class="text-sm ${h.type === 'earn' ? 'text-green-600' : 'text-red-500'} font-semibold">
              ${h.type === 'earn' ? '+' : '-'}${h.amount} 积分
            </div>
            <div class="text-xs text-gray-400">${h.reason || ''}</div>
          </div>
          <div class="text-xs text-gray-400">${new Date(h.created_at).toLocaleDateString()}</div>
        </div>
      `).join('');
    } else {
      el.innerHTML = '<div class="text-center text-gray-500 py-8">暂无记录</div>';
    }
  } catch (e) {
    const el = document.getElementById('historyContent');
    if (el) el.innerHTML = '<div class="text-center text-gray-500 py-8">加载失败</div>';
  }
}

// ==================== UTIL ====================
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== INIT ====================
async function init() {
  // Load users
  try {
    const res = await api('/api/growth/users');
    if (res.code === 200) S.users = res.data || [];
  } catch (e) { console.error('load users error:', e); }

  // Check saved user
  const savedId = localStorage.getItem('currentUserId');
  if (savedId) {
    try {
      const res = await api('/api/growth/user/' + savedId);
      if (res.code === 200) {
        S.currentUser = res.data;
        loadWordBank();
        S.page = 'home';
        render();
        return;
      }
    } catch (e) {}
  }

  S.page = 'login';
  render();
}

init();
</script>
</body>
</html>
